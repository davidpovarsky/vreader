<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>VReader app icon</title>
  <desc>Literary monogram — Source Serif 4 italic V on warm paper, with oxblood swelled rule and &#34;READER&#34; caption.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6efde"></stop>
      <stop offset="1" stop-color="#ead8b4"></stop>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.3" stop-color="rgba(60,40,20,0)"></stop>
      <stop offset="1" stop-color="rgba(60,40,20,0.18)"></stop>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="1" height="1">
      <feTurbulence type="fractalNoise" baseFrequency="2.8" numOctaves="2" seed="3"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.2  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.42 0"></feColorMatrix>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"></rect>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#paper)"></rect>
    <rect width="1024" height="1024" filter="url(#grain)" style="mix-blend-mode:multiply" opacity="0.36"></rect>
    <rect width="1024" height="1024" fill="url(#vignette)"></rect>

    
    <text x="512" y="660" font-family="Source Serif 4, EB Garamond, Iowan Old Style, Georgia, serif" font-size="700" font-weight="600" font-style="italic" fill="#2a1c0b" text-anchor="middle">V</text>

    
    <line x1="378" y1="730" x2="488" y2="730" stroke="#8c2f2f" stroke-width="3" stroke-linecap="round" opacity="0.9"></line>
    <line x1="536" y1="730" x2="646" y2="730" stroke="#8c2f2f" stroke-width="3" stroke-linecap="round" opacity="0.9"></line>
    <polygon points="512,723 519,730 512,737 505,730" fill="#8c2f2f" opacity="0.95"></polygon>

    
    <text x="512" y="820" font-family="Source Serif 4, Georgia, serif" font-size="40" font-weight="500" letter-spacing="10" fill="rgba(58,41,19,0.6)" text-anchor="middle">READER</text>
  </g>
</svg>