name: vreader
options:
  bundleIdPrefix: com.vreader
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  vreader:
    type: application
    platform: iOS
    sources:
      - path: vreader
        excludes:
          - "**/.gitkeep"
          # Older spike copies — Foliate/JS/ is canonical. Keep foliate-bridge.js
          # (only present in EPUB/FoliateJS/) but drop the duplicates.
          - "Services/EPUB/FoliateJS/epubcfi.js"
          - "Services/EPUB/FoliateJS/footnotes.js"
          - "Services/EPUB/FoliateJS/overlayer.js"
          - "Services/EPUB/FoliateJS/text-walker.js"
          - "Services/EPUB/FoliateJS/tts.js"
          # Bug #111: DebugFixtures must NOT ship in Release. xcodegen `excludes`
          # is not per-build-config, so we strip the directory from the source
          # phase entirely and re-inject it via a Debug-only Run Script below.
          - "Resources/DebugFixtures/**"
          # Bug #121: DebugBridge.plist must NOT ship as a sibling Resources-phase
          # file in Release (and is useless to ship in Debug since iOS doesn't read
          # CFBundleURLTypes from sibling plists). Strip it from the source phase
          # entirely; in Debug, the Run Script below merges its CFBundleURLTypes
          # into the BUILT Info.plist so the vreader-debug:// URL scheme actually
          # registers with iOS.
          - "SupportingFiles/DebugBridge.plist"
    preBuildScripts:
      # Bug #111: Copy DebugFixtures into the bundle ONLY when building Debug.
      # Release builds get nothing — verified by running `find vreader.app -name
      # 'war-and-peace*'` after a Release build (should return zero results).
      - name: "Copy DebugFixtures (DEBUG only)"
        script: |
          set -euo pipefail
          if [ "${CONFIGURATION}" != "Debug" ]; then
            echo "Skipping DebugFixtures (Release build)"
            exit 0
          fi
          SRC="${SRCROOT}/vreader/Resources/DebugFixtures"
          DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/DebugFixtures"
          mkdir -p "${DST}"
          # rsync handles empty directories gracefully and only re-copies
          # changed files — `cp -R src/*` would fail when SRC is empty.
          rsync -a --delete "${SRC}/" "${DST}/"
          echo "Copied DebugFixtures: ${SRC} → ${DST}"
        inputFiles:
          - "$(SRCROOT)/vreader/Resources/DebugFixtures"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/DebugFixtures"
    postCompileScripts:
      # Bug #121: Merge DebugBridge.plist's CFBundleURLTypes into the BUILT
      # Info.plist when building Debug. Runs AFTER Xcode processes Info.plist
      # (so we can modify it) but BEFORE code signing.
      #
      # Why postCompileScripts and not preBuildScripts: the BUILT Info.plist at
      # ${TARGET_BUILD_DIR}/${INFOPLIST_PATH} doesn't exist until after the
      # plist-processing build phase runs.
      #
      # Why merge into the BUILT plist instead of generating a per-config
      # source plist: keeps a single source of truth for the base Info.plist
      # (no Info-Debug.plist drifting from Info-Release.plist).
      #
      # Why this is hook-safe: scripts/verify-release-no-debugbridge.sh runs
      # against the Release .app and must continue to pass — this script is
      # gated on `${CONFIGURATION}` == Debug, so it's a no-op for Release.
      - name: "Inject DebugBridge URL types (DEBUG only)"
        script: |
          set -euo pipefail
          if [ "${CONFIGURATION}" != "Debug" ]; then
            echo "Skipping DebugBridge URL injection (Release build)"
            exit 0
          fi
          SRC_PLIST="${SRCROOT}/vreader/SupportingFiles/DebugBridge.plist"
          DST_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          # Fail fast in Debug if the source is missing — silent success
          # would re-introduce bug #121 without anyone noticing.
          if [ ! -f "${SRC_PLIST}" ]; then
            echo "error: ${SRC_PLIST} not found; cannot inject DebugBridge URL types (bug #121 regression risk)" >&2
            exit 1
          fi
          if [ ! -f "${DST_PLIST}" ]; then
            echo "error: built Info.plist not found at ${DST_PLIST}" >&2
            exit 1
          fi
          # Surgical merge using Python plistlib so we:
          #   1. Assert DebugBridge.plist has only the expected top-level key
          #      (`CFBundleURLTypes`) — refuses to silently inject other keys.
          #   2. Preserve any pre-existing CFBundleURLTypes in Info.plist
          #      (future-safe: if a base URL scheme is later added to the
          #      main Info.plist, we don't strip it).
          #   3. Idempotent: replace any prior debug-bridge entry by its
          #      `CFBundleURLName` so re-runs don't append duplicates.
          /usr/bin/env python3 - "${SRC_PLIST}" "${DST_PLIST}" <<'PY'
          import plistlib, sys
          src_path, dst_path = sys.argv[1], sys.argv[2]
          with open(src_path, "rb") as f: src = plistlib.load(f)
          # Assert: source has only what we expect.
          if set(src.keys()) != {"CFBundleURLTypes"}:
              sys.exit(f"error: {src_path} has unexpected top-level keys: {sorted(src.keys())}; expected only ['CFBundleURLTypes']")
          src_url_types = src["CFBundleURLTypes"]
          if not isinstance(src_url_types, list):
              sys.exit(f"error: {src_path} CFBundleURLTypes is not an array")
          with open(dst_path, "rb") as f: dst = plistlib.load(f)
          existing = dst.get("CFBundleURLTypes", []) or []
          # Drop any existing debug-bridge entries by URL name (idempotency).
          DEBUG_NAME = "vreader.debug-bridge"
          existing = [e for e in existing if e.get("CFBundleURLName") != DEBUG_NAME]
          # Append the debug-bridge URL types from DebugBridge.plist.
          existing.extend(src_url_types)
          dst["CFBundleURLTypes"] = existing
          with open(dst_path, "wb") as f: plistlib.dump(dst, f)
          print(f"Injected {len(src_url_types)} DebugBridge URL type(s) into {dst_path}; total now {len(existing)}")
          PY
        inputFiles:
          - "$(SRCROOT)/vreader/SupportingFiles/DebugBridge.plist"
        # No outputFiles: the script modifies the Info.plist that Xcode's own
        # plist-processing phase writes; declaring it as an output here would
        # cause a "duplicate output file" build failure. Lack of outputFiles
        # means Xcode runs the script every build (acceptable — the script is
        # idempotent and < 0.1s).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vreader.app
        CURRENT_PROJECT_VERSION: 544
        MARKETING_VERSION: 3.36.29
    info:
      # XcodeGen writes vreader/SupportingFiles/Info.plist with this content.
      # We need a real Info.plist (not Xcode's auto-generated one) because
      # NSAppTransportSecurity is a nested dict — INFOPLIST_KEY_* build
      # settings only support flat key/value pairs.
      path: vreader/SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: vreader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Bug #110: WebDAV backup feature accepts user-entered HTTP URLs
        # (Tailscale `*.ts.net`, NAS local hostnames, NextCloud / Synology
        # over plain HTTP). iOS ATS blocks all non-loopback HTTP by default.
        # Per-domain exceptions don't fit because the user's hostname is
        # arbitrary. NSAllowsArbitraryLoads is the honest opt-out for an
        # app whose feature is "connect to whatever server the user names."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Feature #60 WI-1b: register the bundled body + UI typefaces so
        # iOS makes them available to UIFont(name:) and WebKit. Filenames
        # only — xcodegen flattens resources to the bundle root, so the
        # .otf files land beside the binary. Source Serif 4 (reader body,
        # SIL OFL 1.1, Reserved Font Name 'Source' — bundled unmodified)
        # + Inter (UI chrome, SIL OFL 1.1). OFL texts ship alongside at
        # Resources/Fonts/{SourceSerif4-LICENSE.md,Inter-LICENSE.txt}.
        UIAppFonts:
          - SourceSerif4-Regular.otf
          - SourceSerif4-It.otf
          - SourceSerif4-Bold.otf
          - SourceSerif4-BoldIt.otf
          - Inter-Regular.otf
          - Inter-Medium.otf
          - Inter-SemiBold.otf
        # Feature #59 WI-1: register vreader as an alternate document handler
        # for the 5 supported formats so iOS Share Sheet / "Open in…" lists
        # the app. `LSHandlerRank: Alternate` keeps us a polite alternative,
        # not the default. `LSSupportsOpeningDocumentsInPlace: true` lets the
        # incoming file URL be opened in-place rather than copied first.
        # Tap-dispatch is wired by WI-2 (`FileURLImportRouter` + production
        # `.onOpenURL`); pre-WI-2 the Share Sheet entry appears but tapping
        # vreader does nothing (intentional partial delivery per the plan).
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB Book
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: PDF Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
          - CFBundleTypeName: Plain Text
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
          - CFBundleTypeName: Markdown Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
          - CFBundleTypeName: Kindle Book
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.amazon.azw3
              - com.amazon.mobi-pocket
        # Apple does not ship public UTIs for the Kindle file family, so we
        # declare them as imported types. Conforming to `public.data` is the
        # canonical pattern for opaque binary formats.
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.amazon.azw3
            UTTypeConformsTo:
              - public.data
            UTTypeDescription: Amazon Kindle AZW3
            UTTypeTagSpecification:
              public.filename-extension:
                - azw3
                - azw
              public.mime-type:
                - application/vnd.amazon.ebook
          - UTTypeIdentifier: com.amazon.mobi-pocket
            UTTypeConformsTo:
              - public.data
            UTTypeDescription: Mobipocket eBook
            UTTypeTagSpecification:
              public.filename-extension:
                - mobi
                - prc
              public.mime-type:
                - application/x-mobipocket-ebook
    scheme:
      testTargets:
        - vreaderTests
        - vreaderUITests
      # Feature #45 WI-6: named test plans. `All` keeps the no-flag default
      # (`Cmd+U` / `xcodebuild test`) running the full suite. `Verification`
      # selects the 25 per-method identifiers under vreaderUITests/Verification/
      # (one named flag instead of an `-only-testing:` string in every CI/cron
      # invocation). Membership is checked-in JSON at TestPlans/Verification.xctestplan
      # and must be kept in sync with the filesystem; Gate 5 parses the JSON.
      testPlans:
        - path: TestPlans/All.xctestplan
          defaultPlan: true
        - path: TestPlans/Verification.xctestplan

  vreaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: vreaderTests
        excludes:
          - "**/.gitkeep"
          - "ViewModels/LibraryViewModelPersistenceTests.swift"
    dependencies:
      - target: vreader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vreader.tests
        GENERATE_INFOPLIST_FILE: YES

  vreaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: vreaderUITests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: vreader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vreader.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: vreader
