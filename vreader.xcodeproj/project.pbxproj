			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\nif [ \"${CONFIGURATION}\" != \"Debug\" ]; then\n  echo \"Skipping DebugBridge URL injection (Release build)\"\n  exit 0\nfi\nSRC_PLIST=\"${SRCROOT}/vreader/SupportingFiles/DebugBridge.plist\"\nDST_PLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\n# Fail fast in Debug if the source is missing — silent success\n# would re-introduce bug #121 without anyone noticing.\nif [ ! -f \"${SRC_PLIST}\" ]; then\n  echo \"error: ${SRC_PLIST} not found; cannot inject DebugBridge URL types (bug #121 regression risk)\" >&2\n  exit 1\nfi\nif [ ! -f \"${DST_PLIST}\" ]; then\n  echo \"error: built Info.plist not found at ${DST_PLIST}\" >&2\n  exit 1\nfi\n# Surgical merge using Python plistlib so we:\n#   1. Assert DebugBridge.plist has only the expected top-level key\n#      (`CFBundleURLTypes`) — refuses to silently inject other keys.\n#   2. Preserve any pre-existing CFBundleURLTypes in Info.plist\n#      (future-safe: if a base URL scheme is later added to the\n#      main Info.plist, we don't strip it).\n#   3. Idempotent: replace any prior debug-bridge entry by its\n#      `CFBundleURLName` so re-runs don't append duplicates.\n/usr/bin/env python3 - \"${SRC_PLIST}\" \"${DST_PLIST}\" <<'PY'\nimport plistlib, sys\nsrc_path, dst_path = sys.argv[1], sys.argv[2]\nwith open(src_path, \"rb\") as f: src = plistlib.load(f)\n# Assert: source has only what we expect.\nif set(src.keys()) != {\"CFBundleURLTypes\"}:\n    sys.exit(f\"error: {src_path} has unexpected top-level keys: {sorted(src.keys())}; expected only ['CFBundleURLTypes']\")\nsrc_url_types = src[\"CFBundleURLTypes\"]\nif not isinstance(src_url_types, list):\n    sys.exit(f\"error: {src_path} CFBundleURLTypes is not an array\")\nwith open(dst_path, \"rb\") as f: dst = plistlib.load(f)\nexisting = dst.get(\"CFBundleURLTypes\", []) or []\n# Drop any existing debug-bridge entries by URL name (idempotency).\nDEBUG_NAME = \"vreader.debug-bridge\"\nexisting = [e for e in existing if e.get(\"CFBundleURLName\") != DEBUG_NAME]\n# Append the debug-bridge URL types from DebugBridge.plist.\nexisting.extend(src_url_types)\ndst[\"CFBundleURLTypes\"] = existing\nwith open(dst_path, \"wb\") as f: plistlib.dump(dst, f)\nprint(f\"Injected {len(src_url_types)} DebugBridge URL type(s) into {dst_path}; total now {len(existing)}\")\nPY\n";
