  <h1 class="chapter-title">第一章 陨落的天才</h1>
  <div class="content">
    <p>少年缓缓坐了下来，白色的桌面上，一张关于家族的排名表被他攥在手中。</p>
    <p>表上，记录着家族年轻一代所有人的修炼进度。</p>
    <p>最顶端处，一个仅有十一岁却以斗之气四段的成绩排在首位的少年名字，赫然写的便是萧炎。</p>
